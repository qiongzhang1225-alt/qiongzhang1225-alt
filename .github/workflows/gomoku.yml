name: Gomoku Game

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process-move:
    if: startsWith(github.event.issue.title, 'gomoku')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: gomoku-game
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Process move
        id: move
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python gomoku/scripts/process_move.py \
            "${{ github.event.issue.title }}" \
            "${{ github.event.issue.user.login }}" \
            --repo "${{ github.repository }}"

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md gomoku/board.json gomoku/history.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "gomoku: ${{ github.event.issue.title }} by @${{ github.event.issue.user.login }}"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const message = `${{ steps.move.outputs.message }}` || "处理完成。";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message + "\n\n---\n[查看最新棋盘 →](https://github.com/" + context.repo.owner + "/" + context.repo.repo + "#-来跟我下一局五子棋)"
            });

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
